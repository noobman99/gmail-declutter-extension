<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gmail Declutterer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>

  <!-- ── Top Bar ─────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Gmail<em>Declutterer</em></span>
    </div>
    <button id="btn-signout" class="btn-ghost" hidden>Sign out</button>
  </header>

  <!-- ── Views ──────────────────────────────────────────────────── -->

  <!-- View: Auth -->
  <section id="view-auth" class="view active">
    <div class="hero">
      <div class="hero-glyph">✉</div>
      <h1 class="hero-title">Declutter<br />your inbox</h1>
      <p class="hero-sub">
        Connect your Gmail account to scan senders<br />and bulk-delete what you don't need.
      </p>
      <button id="btn-login" class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M43.6 20.2H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.1 8 3l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.8z"
            fill="#FFC107" />
          <path
            d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.9 1.1 8 3l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"
            fill="#FF3D00" />
          <path
            d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.4 26.7 36 24 36c-5.3 0-9.7-3.3-11.4-8l-6.5 5C9.5 39.5 16.3 44 24 44z"
            fill="#4CAF50" />
          <path d="M43.6 20.2H42V20H24v8h11.3c-.8 2.2-2.3 4.1-4.2 5.5l6.2 5.2C37 38.2 44 33 44 24c0-1.3-.1-2.6-.4-3.8z"
            fill="#1976D2" />
        </svg>
        Connect with Google
      </button>
    </div>
  </section>

  <!-- View: Dashboard -->
  <section id="view-dashboard" class="view" hidden>

    <!-- Stats strip -->
    <div class="stats-strip">
      <div class="stat">
        <span class="stat-val" id="stat-total">—</span>
        <span class="stat-label">emails scanned</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-senders">—</span>
        <span class="stat-label">unique senders</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-deleted">0</span>
        <span class="stat-label">deleted</span>
      </div>
    </div>

    <!-- Cache info -->
    <div class="cache-bar">
      <span id="cache-info" class="cache-info">No previous scan</span>
    </div>

    <!-- Action bar -->
    <div class="action-bar">
      <button id="btn-scan" class="btn-primary">
        <span class="btn-icon">⟳</span> Start Scan
      </button>
      <button id="btn-force-rescan" class="btn-ghost btn-rescan" hidden title="Clear cache and do a full inbox scan">
        Full rescan
      </button>
      <div class="search-wrap">
        <input id="search-input" type="text" placeholder="Filter senders…" class="search-input" disabled />
      </div>
    </div>

    <!-- Progress -->
    <div id="progress-wrap" class="progress-wrap" hidden>
      <div class="progress-bar-track">
        <div id="progress-bar" class="progress-bar" style="width:0%"></div>
      </div>
      <p id="progress-label" class="progress-label">Initialising…</p>
    </div>

    <!-- Table -->
    <div id="table-wrap" class="table-wrap" hidden>
      <table class="sender-table">
        <thead>
          <tr>
            <th>Sender</th>
            <th class="th-count">Emails</th>
            <th class="th-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="sender-tbody"></tbody>
      </table>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" hidden>
      <span class="empty-icon">📭</span>
      <p>No senders match your filter.</p>
    </div>

  </section>

  <!-- ── Confirmation Modal ───────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal">
      <h2 class="modal-title">Delete all emails?</h2>
      <p id="modal-body" class="modal-body"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-ghost">Cancel</button>
        <button id="modal-confirm" class="btn-danger">Move to trash</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ────────────────────────────────────────────────────── -->
  <div id="toast" class="toast" hidden></div>

  <script src="popup.js" type="module"></script>
</body>

</html>
